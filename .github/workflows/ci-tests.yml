name: Cartola CI/CD Pipeline

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  quality-check:
    name: 🐍 Code Quality & Syntax
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 bandit

    - name: 🔍 Check Python Syntax (Compile)
      run: |
        python -m compileall .

    - name: 🎨 Lint with Flake8
      run: |
        # Stop the build on fatal syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warn about style issues but don't fail
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: 🧪 Run Unit Tests
      run: |
        pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=40
      env:
        # Tests run without real credentials — mocks handle auth
        GCP_SERVICE_ACCOUNT: ""
        CARTOLA_GLBID: ""
        GEMINI_API_KEY: ""

  security-check:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Security Tools
      run: pip install bandit

    - name: 🛡️ Run Bandit (Security Audit)
      run: bandit -r . -ll --exclude ./tests

    - name: 🕵️ Check for Hardcoded Secrets (Grep Fallback)
      run: |
        echo "Checking for obvious hardcoded secrets..."
        if grep -rE "BEGIN PRIVATE KEY|eyJhbGci|AIza[0-9A-Za-z-_]{35}" --include="*.py" .; then
          echo "⛔ DANGER: Potential secret key found in code!"
          exit 1
        else
          echo "✅ No obvious secrets found."
        fi