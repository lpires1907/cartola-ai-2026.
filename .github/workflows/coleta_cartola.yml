name: Cartola Analytics Pipeline

on:
  schedule:
    # Horários Brasil (GMT-3): 12h, 16h, 18h, 20h, 22h, 00h
    # Horários UTC (+3)    : 15h, 19h, 21h, 23h, 01h, 03h
    - cron: '0 1,3,15,19,21,23 * * *'
  workflow_dispatch:

jobs:
  executar_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          # Alterado para ler do arquivo, garantindo que google-genai e matplotlib sejam instalados
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: 🏥 Health Check (Sanity)
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          CARTOLA_GLBID: ${{ secrets.CARTOLA_GLBID }}
        run: python src/health_check.py

      - name: 🚀 Executar Maestro
        env:
          # Segredos existentes
          CARTOLA_EMAIL: ${{ secrets.CARTOLA_EMAIL }}
          CARTOLA_SENHA: ${{ secrets.CARTOLA_SENHA }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CARTOLA_GLBID: ${{ secrets.CARTOLA_GLBID }}
        run: python main.py
